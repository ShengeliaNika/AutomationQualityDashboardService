spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/dashboarddb}
    username: ${DB_USERNAME:dashboard}
    password: ${DB_PASSWORD:dashboard}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: ${PORT:${SERVER_PORT:8080}}
