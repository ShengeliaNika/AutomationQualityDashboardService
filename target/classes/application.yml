spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/dashboarddb}
    username: ${DB_USERNAME:dashboard}
    password: ${DB_PASSWORD:dashboard}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: ${PORT:${SERVER_PORT:8080}}

clickup:
  enabled: ${CLICKUP_ENABLED:true}
  api-key: ${CLICKUP_API_KEY:pk_88537419_K83AQFOFGLE4FYGFQZLGVKE93QK0B3RF}
  list-id: ${CLICKUP_LIST_ID:901517077751}

dashboard:
  base-url: ${DASHBOARD_BASE_URL:http://localhost:8080}
