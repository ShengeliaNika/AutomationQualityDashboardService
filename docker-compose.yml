version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: dashboard-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dashboarddb}
      POSTGRES_USER: ${POSTGRES_USER:-dashboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dashboard}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dashboard} -d ${POSTGRES_DB:-dashboarddb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dashboard-network

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dashboard-app
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-dashboarddb}
      DB_USERNAME: ${DB_USERNAME:-dashboard}
      DB_PASSWORD: ${DB_PASSWORD:-dashboard}
      SERVER_PORT: 8080
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dashboard-network
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local

networks:
  dashboard-network:
    driver: bridge
